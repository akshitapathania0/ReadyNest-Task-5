databases:
  - name: nexaos-db
    plan: basic-256mb
    region: oregon
    databaseName: nexaos
    user: nexaos

services:
  - type: redis
    name: nexaos-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all

  - type: web
    name: nexaos-backend
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexaos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nexaos-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: CLIENT_URL
        fromService:
          name: nexaos-frontend
          type: web
          property: host
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@nexaos.app

  - type: web
    name: nexaos-frontend
    runtime: static
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: nexaos-backend
          type: web
          property: host
